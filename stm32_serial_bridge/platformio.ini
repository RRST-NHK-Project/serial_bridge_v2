; PlatformIO Project Configuration File
;
; STM32 firmware for serial_bridge
; - Frame protocol compatible with serial_bridge ROS 2 node
; - Full I/O: MD1..8, SERVO1..8, TR1..7, ENC1..8, SW1..8
; - NOTE: askuric/Simple FOC is used only for quadrature encoder decoding helper (Encoder). No motor FOC control is implemented.

[env:nucleo_f446re]
platform = ststm32
board = nucleo_f446re
framework = arduino
monitor_speed = 115200

lib_deps =
  askuric/Simple FOC

[env:nucleo_f767zi]
platform = ststm32
board = nucleo_f767zi
framework = arduino
monitor_speed = 115200

lib_deps =
  askuric/Simple FOC
