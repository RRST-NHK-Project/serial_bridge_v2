; PlatformIO Project Configuration File
;
; Arduino Uno firmware for serial_bridge
; - Frame protocol compatible with serial_bridge ROS 2 node
; - IO mode: Servo output + Switch input

[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200

; Arduino built-in style libraries are not always picked up unless declared.
; This ensures <Servo.h> is available.
lib_deps =
	arduino-libraries/Servo
